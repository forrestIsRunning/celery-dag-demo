services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  model-service:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /model
    volumes:
      - ./model_service:/model
      - uv-cache:/root/.cache/uv
    ports:
      - "9000:9000"
    environment:
      - FLASK_APP=app.py
    command: >
      bash -c "uv pip install --system flask &&
               flask run --host=0.0.0.0 --port=9000"

  director-web:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    command: >
      bash -c "uv pip install --system -r pyproject.toml &&
               director db upgrade &&
               director webserver -b 0.0.0.0:8000"

  worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv
    env_file: .env
    depends_on:
      - redis
      - director-web
      - model-service
    command: >
      bash -c "uv pip install --system -r pyproject.toml &&
               director celery worker --loglevel=INFO"

volumes:
  uv-cache:
